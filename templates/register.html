{% extends "base.html" %}
{% block title %}Edunexus - Register{% endblock %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height:70vh;">
  <div class="card-attractive" style="max-width:420px; width:100%;">
    <h3 style="color:var(--dark);">Create an Edunexus Account</h3>
    <form method="POST" class="mt-3">
      <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
      <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
      <input type="text" name="department" class="form-control mb-3" placeholder="Department (CSE/ECE/...)" required>
      <button class="btn btn-accent w-100">Create Account</button>
    </form>
    {% if error_message %}<div class="alert alert-danger mt-2">{{ error_message }}</div>{% endif %}
  </div>
</div>
{% endblock %}
