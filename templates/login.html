{% extends "base.html" %}
{% block title %}Edunexus - Login{% endblock %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height:70vh;">
  <div class="card-attractive" style="max-width:420px; width:100%;">
    <h3 style="color:var(--dark);">Login to Edunexus</h3>
    <form method="POST" class="mt-3">
      <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
      <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
      <button class="btn btn-primary w-100">Login</button>
    </form>
    <p class="mt-3 text-center">Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
    {% if message %}<div class="alert alert-danger mt-2">{{ message }}</div>{% endif %}
  </div>
</div>
{% endblock %}
