{% extends "base.html" %}
{% block title %}Online Library{% endblock %}

{% block content %}
<div class="container glass mt-5 p-4">

    <!-- Page Header -->
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h2 class="fw-bold" style="color: var(--dark);">📚 Online Library</h2>
            <p class="text-muted mb-0">Browse your semester’s digital books</p>
        </div>
        <div>
            <a href="{{ url_for('feedback') }}" class="btn btn-accent">Give Feedback</a>
        </div>
    </div>

    <!-- Books Display -->
    <div class="row">
        {% for b in books %}
        <div class="col-md-6 mb-4">
            <div class="card-attractive h-100 p-3">
                <div class="mb-3">
                    <h5 class="fw-bold" style="color: var(--dark); margin-bottom: 4px;">
                        {{ b[1] }}
                    </h5>
                    <small class="text-muted"><em>by {{ b[2] }}</em></small>
                </div>

                <div style="
                    border-radius: 12px;
                    overflow: hidden;
                    border: 1px solid rgba(0,0,0,0.08);
                    background: var(--white);
                ">
                    <iframe
                        src="{{ url_for('static', filename='books/' + b[3]) }}"
                        width="100%"
                        height="320"
                        style="border: 0;">
                    </iframe>
                </div>

                <div class="mt-3 d-flex justify-content-end gap-2">
                    <a href="{{ url_for('static', filename='books/' + b[3]) }}" target="_blank"
                       class="btn btn-outline-soft">
                        Open
                    </a>

                    <a href="{{ url_for('download_book', filename=b[3]) }}"
                       class="btn btn-primary">
                        Download
                    </a>
                </div>

            </div>
        </div>
        {% endfor %}
    </div>

</div>
{% endblock %}
