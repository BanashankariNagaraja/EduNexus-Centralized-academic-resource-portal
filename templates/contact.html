{% extends "base.html" %}
{% block title %}Contact Us{% endblock %}
{% block content %}
<div class="container glass mt-4 p-4">
  <div class="row">
    <div class="col-md-7">
      <h3 style="color:var(--dark)">Contact Us</h3>
      <p class="text-muted">Have a question? Send us a message.</p>

      {% if success %}
        <div class="alert alert-success">{{ success }}</div>
      {% endif %}

      <form method="POST">
        <input type="text" name="name" class="form-control mb-3" placeholder="Your name" required>
        <input type="email" name="email" class="form-control mb-3" placeholder="Your email" required>
        <input type="text" name="subject" class="form-control mb-3" placeholder="Subject" required>
        <textarea name="message" class="form-control mb-3" rows="6" placeholder="Message" required></textarea>
        <button class="btn btn-primary">Send Message</button>
      </form>
    </div>
    <div class="col-md-5">
      <div class="card-attractive">
        <h5 style="color:var(--dark)">Office</h5>
        <p class="text-muted mb-0">Edunexus Team</p>
        <p class="text-muted">support@edunexus.example</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
