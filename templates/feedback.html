{% extends "base.html" %}
{% block title %}Feedback{% endblock %}
{% block content %}
<div class="container glass mt-4 p-4">
  <h3 style="color:var(--dark)">Share your feedback</h3>
  <form method="POST" class="mt-3">
    <input type="text" name="name" class="form-control mb-3" placeholder="Your name" required>
    <input type="text" name="department" class="form-control mb-3" placeholder="Department" required>
    <input type="number" name="semester" class="form-control mb-3" placeholder="Semester" required min="1" max="8">
    <textarea name="feedback" class="form-control mb-3" rows="5" placeholder="Your feedback" required></textarea>
    <button class="btn btn-accent">Submit Feedback</button>
  </form>
</div>
{% endblock %}
