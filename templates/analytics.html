{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="fw-bold" style="color:var(--dark);" >Analytics</h3>
    <div>
      <button id="regen-btn" class="btn btn-outline-soft btn-sm">Regenerate</button>
      <a class="btn btn-accent btn-sm ms-2" href="{{ url_for('admin_dashboard') }}">
        Back to Admin
      </a>
    </div>
  </div>

  <!-- COUNTS SECTION -->
  <div class="card shadow-soft p-3 mb-4">
    <div class="row gx-3">
      <div class="col-md-7">
        <h5>Counts</h5>
        <canvas id="countsBar" style="max-height:380px;"></canvas>
      </div>

      <div class="col-md-5">
        <h5>Resource Distribution</h5>
        <canvas id="countsDoughnut" style="max-height:300px;"></canvas>

        <hr>
        <h6>Summary</h6>
        <ul id="counts-list" class="list-unstyled small text-muted"></ul>
      </div>
    </div>
  </div>

  <!-- SUBJECTS SECTION -->
  <div class="card shadow-soft p-3 mb-4">
    <h5>Subjects — Department & Semester</h5>

    <!-- SUBJECTS GRAPH -->
    <canvas id="subjectsDeptSemChart" style="max-height:350px;" class="mb-4"></canvas>

    <div class="table-responsive">
      <table class="table table-bordered small" id="subjects-table">
        <thead>
          <tr>
            <th>Department</th>
            <th>Semester</th>
            <th>Count</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- USERS SECTION -->
  <div class="card shadow-soft p-3 mb-4">
    <h5>Users by Department</h5>

    <!-- USERS GRAPH -->
    <canvas id="usersDeptChart" style="max-height:300px;" class="mb-3"></canvas>

    <div id="users-by-dept" class="small text-muted"></div>
  </div>

</div>

<!-- CHART.JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script>
const apiUrl = "{{ url_for('admin_analytics_json') }}";

let barChart, doughnutChart, subjectsChart, usersDeptChart;

/* ---------- HELPERS ---------- */
function formatCountsList(counts) {
  const keys = ['users','books','subjects','courses','feedbacks','messages'];
  const ul = document.getElementById('counts-list');
  ul.innerHTML = '';
  keys.forEach(k => {
    ul.innerHTML += `<li><strong>${k}</strong>: ${counts[k] ?? 0}</li>`;
  });
}

function renderSubjectsTable(list) {
  const tbody = document.querySelector('#subjects-table tbody');
  tbody.innerHTML = '';
  list.forEach(r => {
    tbody.innerHTML += `
      <tr>
        <td>${r.department || 'Unknown'}</td>
        <td>${r.semester || ''}</td>
        <td>${r.cnt || r.count || 0}</td>
      </tr>`;
  });
}

function renderUsersByDept(list) {
  const el = document.getElementById('users-by-dept');
  if (!list || list.length === 0) {
    el.innerHTML = '<span class="text-muted">No data</span>';
    return;
  }
  el.innerHTML = `<ul>${list.map(r =>
    `<li>${r.department || 'Unknown'}: ${r.cnt}</li>`
  ).join('')}</ul>`;
}

/* ---------- SUBJECTS GRAPH ---------- */
function renderSubjectsChart(list) {
  if (!list || list.length === 0) return;
  if (subjectsChart) subjectsChart.destroy();

  subjectsChart = new Chart(
    document.getElementById('subjectsDeptSemChart'),
    {
      type: 'bar',
      data: {
        labels: list.map(r => `${r.department} - Sem ${r.semester}`),
        datasets: [{
          data: list.map(r => r.cnt || 0),
          backgroundColor: '#96BF8A',
          borderRadius: 6
        }]
      },
      options: {
        indexAxis: 'y',
        plugins: { legend: { display: false } },
        scales: { x: { beginAtZero: true } }
      }
    }
  );
}

/* ---------- USERS GRAPH ---------- */
function renderUsersDeptChart(list) {
  if (!list || list.length === 0) return;
  if (usersDeptChart) usersDeptChart.destroy();

  usersDeptChart = new Chart(
    document.getElementById('usersDeptChart'),
    {
      type: 'bar',
      data: {
        labels: list.map(r => r.department),
        datasets: [{
          data: list.map(r => r.cnt),
          backgroundColor: '#00412E',
          borderRadius: 6
        }]
      },
      options: {
        indexAxis: 'y',
        plugins: { legend: { display: false } },
        scales: { x: { beginAtZero: true } }
      }
    }
  );
}

/* ---------- LOAD ALL ---------- */
async function loadAnalyticsAndDraw() {
  const res = await fetch(apiUrl);
  const data = await res.json();
  const counts = data.counts || {};

  formatCountsList(counts);

  const keys = ['users','books','subjects','courses','feedbacks','messages'];
  const labels = keys.map(k => k.charAt(0).toUpperCase() + k.slice(1));
  const values = keys.map(k => counts[k] || 0);

  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('countsBar'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: ['#00412E','#96BF8A'],
        borderRadius: 6
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true } }
    }
  });

  if (doughnutChart) doughnutChart.destroy();
  doughnutChart = new Chart(document.getElementById('countsDoughnut'), {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: ['#00412E','#96BF8A','#E8EAE5','#BFD8B8']
      }]
    },
    options: {
      plugins: { legend: { position: 'bottom' } }
    }
  });

  renderSubjectsTable(data.subjects_by_dept_sem || []);
  renderUsersByDept(data.users_by_dept || []);
  renderSubjectsChart(data.subjects_by_dept_sem || []);
  renderUsersDeptChart(data.users_by_dept || []);
}

/* ---------- REGENERATE ---------- */
document.getElementById('regen-btn').onclick = async function () {
  if (!confirm('Regenerate analytics now?')) return;
  this.disabled = true;
  this.innerText = 'Regenerating...';
  await fetch('{{ url_for("admin_regenerate_analytics") }}', { method: 'POST' });
  await loadAnalyticsAndDraw();
  this.disabled = false;
  this.innerText = 'Regenerate';
};

document.addEventListener('DOMContentLoaded', loadAnalyticsAndDraw);
</script>

<style>
:root {
  --dark: #00412E;
  --soft: #96BF8A;
  --light: #E8EAE5;
  --white: #FFFFFF;
}

body { background: var(--light); }

.card {
  background: var(--white);
  border-radius: 14px;
  border: none;
}

.shadow-soft {
  box-shadow: 0 8px 24px rgba(0,65,46,0.12);
}

.btn-accent {
  background: var(--dark);
  color: white;
}

.btn-outline-soft {
  border: 1px solid var(--soft);
  color: var(--dark);
}

.btn-outline-soft:hover {
  background: var(--soft);
}
</style>
{% endblock %}
