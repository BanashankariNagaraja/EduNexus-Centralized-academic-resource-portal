<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<style>
    .navbar-custom {
        background-color: #000 !important;
        color: white !important;
        width: 100%;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        border-bottom: 2px solid rgba(255, 255, 255, 0.1);
    }

    .navbar-brand {
        font-weight: bold;
        font-size: 1.5rem;
        color: white !important;
    }

    .nav-link {
        color: white !important;
        font-weight: 500;
    }

    .nav-link:hover {
        color: #FFD93D !important;
    }

    .navbar-toggler {
        border: none;
        outline: none;
    }

    .navbar-toggler-icon {
        background-image: url("data:image/svg+xml;charset=utf8,%3Csvg viewBox='0 0 30 30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath stroke='rgba%28 255, 255, 255, 0.8 %29)' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3E%3C/svg%3E");
    }

    .btn-accent {
        background-color: #FFD93D;
        color: black;
        font-weight: 600;
        border-radius: 10px;
        padding: 6px 16px;
    }

    .btn-accent:hover {
        background-color: #ffcc00;
        color: black !important;
    }
</style>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top navbar-custom">
    <div class="container-fluid px-3">

        <!-- Brand -->
        <a class="navbar-brand d-flex align-items-center" href="{{ url_for('home') }}">
            <img src="{{ url_for('static', filename='logo1.png') }}" alt="Logo"
                style="height: 40px; margin-right: 10px;">
            <span>EduNexus</span>
        </a>

        <!-- Toggler -->
        <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Links -->
        <div class="collapse navbar-collapse justify-content-end" id="navbarMenu">
            <div class="d-flex align-items-center">

                <a class="nav-link me-3" href="{{ url_for('login') }}">Library</a>
                <a class="nav-link me-3" href="{{ url_for('feedback') }}">Feedback</a>
                <a class="nav-link me-3" href="{{ url_for('contact') }}">Contact</a>

                {% if 'user' in session %}

                    {% if session['user'] == 'admin' %}
                        <a class="nav-link me-3" href="{{ url_for('admin_dashboard') }}">Admin</a>
                        <a class="nav-link me-3" href="{{ url_for('analytics_page') }}">Analytics</a>
                    {% else %}
                        <a class="nav-link me-3" href="{{ url_for('user_dashboard') }}">Dashboard</a>
                    {% endif %}

                    <a class="nav-link me-3" href="{{ url_for('logout') }}">Logout</a>

                {% else %}
                    <a class="nav-link me-3" href="{{ url_for('login') }}">Login</a>
                    <a class="btn btn-accent ms-2" href="{{ url_for('register') }}">Register</a>
                {% endif %}
            </div>
        </div>

    </div>
</nav>
